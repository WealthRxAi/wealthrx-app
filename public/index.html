<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WealthRx</title>
  <link rel="icon" type="image/png" href="/icon-192.png">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { 
      background: #0A0E0D; 
      color: #FAFAF8; 
      font-family: 'DM Sans', sans-serif; 
      min-height: 100vh; 
      display: flex; 
      align-items: center; 
      justify-content: center; 
      padding: 24px;
    }
    .loading-card { text-align: center; }
    .logo {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
    }
    .logo-icon {
      width: 48px;
      height: 48px;
      border-radius: 14px;
      background: linear-gradient(135deg, #0D7C5F, #10A37F);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(13,124,95,0.3);
    }
    .logo-text .wealth { 
      font-family: 'Instrument Serif', serif; 
      font-size: 32px;
    }
    .logo-text .rx { 
      font-weight: 700; 
      font-size: 28px; 
      color: #10A37F;
    }
    .spinner {
      width: 32px;
      height: 32px;
      margin: 0 auto 16px;
      border: 3px solid rgba(16,163,127,0.2);
      border-top-color: #10A37F;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status {
      color: rgba(250,250,248,0.5);
      font-size: 15px;
      font-weight: 300;
    }
  </style>
</head>
<body>
  <div class="loading-card">
    <div class="logo">
      <div class="logo-icon">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#FAFAF8" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/>
          <polyline points="16 7 22 7 22 13"/>
        </svg>
      </div>
      <div class="logo-text"><span class="wealth">Wealth</span><span class="rx">Rx</span></div>
    </div>
    <div class="spinner"></div>
    <div class="status" id="status">Loading...</div>
  </div>

  <script>
    var SUPABASE_URL = 'https://rvlipquyxkehiqhgptai.supabase.co';
    var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ2bGlwcXV5eGtlaGlxaGdwdGFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2OTcxMDIsImV4cCI6MjA5MTI3MzEwMn0.r2Uh5r21dUknjf-XbipbOeuHs8FwM8KNJNC9ZvpmSXI';
    var sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    async function route() {
      try {
        var sessionResult = await sb.auth.getSession();
        
        if (!sessionResult.data.session) {
          document.getElementById('status').textContent = 'Redirecting to sign in...';
          window.location.href = '/login.html';
          return;
        }

        var userId = sessionResult.data.session.user.id;

        var profileResult = await sb.from('profiles')
          .select('approved, onboarded')
          .eq('id', userId)
          .single();

        if (!profileResult.data) {
          document.getElementById('status').textContent = 'Setting up your account...';
          window.location.href = '/waitlist.html';
          return;
        }

        if (profileResult.data.approved === false) {
          document.getElementById('status').textContent = 'Loading your waitlist status...';
          window.location.href = '/waitlist.html';
          return;
        }

        if (!profileResult.data.onboarded) {
          document.getElementById('status').textContent = 'Setting up your profile...';
          window.location.href = '/onboarding.html';
          return;
        }

        document.getElementById('status').textContent = 'Loading your dashboard...';
        window.location.href = '/dashboard.html';
      } catch (error) {
        console.error('Routing error:', error);
        document.getElementById('status').textContent = 'Redirecting...';
        setTimeout(function() {
          window.location.href = '/login.html';
        }, 1000);
      }
    }

    route();
  </script>
</body>
</html>
